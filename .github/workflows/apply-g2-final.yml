name: Apply G2 final integration

on:
  push:
    branches:
      - agent/integration-v06-g2-final
    paths:
      - ".github/g2-final/**"
      - ".github/workflows/apply-g2-final.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/g2-final/**"
      - ".github/workflows/apply-g2-final.yml"

permissions:
  contents: write

concurrency:
  group: apply-g2-final-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out staged branch
        uses: actions/checkout@v7
        with:
          ref: agent/integration-v06-g2-final
          fetch-depth: 0

      - name: Verify current main ancestry
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "1c7aa39550ac1a0202a0bea4bef53a038881d434"
          git merge-base --is-ancestor origin/main HEAD

      - name: Verify and apply immutable patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/g2-final/patch.part-* | base64 --decode > /tmp/g2-final.patch.gz
          echo "d0c3efd853aaee4962c29cbe3f45708aeb3a5a5fe103573dbca99b74d9faa03d  /tmp/g2-final.patch.gz" | sha256sum --check --strict
          gzip -dc /tmp/g2-final.patch.gz > /tmp/g2-final.patch
          echo "b6c34bc27738c0cba48f2fb9834646846cbe06ce955fc4e014bfba772de24dc9  /tmp/g2-final.patch" | sha256sum --check --strict
          git apply --check /tmp/g2-final.patch
          git apply --index /tmp/g2-final.patch
          rm -rf .github/g2-final
          rm -f .github/workflows/apply-g2-final.yml
          git add -A

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate merged source before publication
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m compileall -q app scripts tests
          python scripts/validate_g0.py
          python prompt_pack/tools/validate_pack.py
          python -m pytest -q \
            tests/test_g2_gate.py \
            tests/test_g2_three_section_chain.py \
            tests/test_single_section_chain.py

      - name: Commit and push non-workflow integration source
        shell: bash
        run: |
          set -euo pipefail
          git restore --staged .github
          git checkout HEAD -- .github/g2-final .github/workflows/apply-g2-final.yml
          rm -f .github/workflows/g2.yml .github/workflows/g2-three-sections.yml
          git add -A
          git config user.name "proposal-agent-integration"
          git config user.email "proposal-agent-integration@users.noreply.github.com"
          git commit -m "complete G2 small-scale integration source"
          git push origin HEAD:agent/integration-v06-g2-final
