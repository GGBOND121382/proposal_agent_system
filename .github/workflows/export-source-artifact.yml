name: Export current S1 branch source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pinned S1 branch head
        uses: actions/checkout@v7
        with:
          ref: 5ccf357638107891d7d79bb7299c8c4a3b31f221
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exported identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "5ccf357638107891d7d79bb7299c8c4a3b31f221"

      - name: Upload source tree
        uses: actions/upload-artifact@v7
        with:
          name: proposal-agent-current-s1-source-v2
          path: |
            .
            !.git/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
