name: Export source artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build source archive
        run: git archive --format=zip --output=proposal_agent_system-main.zip HEAD
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: proposal-agent-source
          path: proposal_agent_system-main.zip
          if-no-files-found: error
          retention-days: 1
