name: Analyze latest main sync

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/analyze-main-sync.yml"

permissions:
  contents: read

jobs:
  analyze:
    if: github.event.pull_request.head.ref == 'agent/integration-v06-single-section'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Attempt merge and report conflicts
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          status=$?
          set -e
          echo "merge_status=${status}"
          echo "conflicts:"
          git diff --name-only --diff-filter=U || true
          echo "changed files from main:"
          git diff --name-status HEAD...origin/main || true
          exit ${status}

# registered before the reopened PR event
