name: Track E Quality Gate

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  quality-track-e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Track E implementation
        run: python -m compileall app scripts

      - name: Run Track E acceptance
        run: python scripts/quality_track_e_acceptance.py

      - name: Upload Track E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-e-quality-evidence
          path: recovery_evidence/track_e/
          if-no-files-found: error
