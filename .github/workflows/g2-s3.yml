name: G2 S3 Research Mermaid Export

on:
  push:
    branches:
      - main
      - agent/integration-v06
  pull_request:
    branches:
      - main
    paths:
      - "app/research.py"
      - "app/skill_setup.py"
      - "app/skills/research_*.py"
      - "app/skills/verifiable_public_research.py"
      - "app/skills/mermaid.py"
      - "app/figure_protocol.py"
      - "app/exporter_*.py"
      - "app/pdf_exporter.py"
      - "app/delivery_validator*.py"
      - "app/s3_evidence.py"
      - "scripts/run_s3_research_mermaid_export.py"
      - "scripts/verify_s3_evidence.py"
      - "tests/test_research_skill_track_c.py"
      - "tests/test_d_track.py"
      - "tests/test_s3_research_mermaid_export.py"
      - ".github/workflows/g2-s3.yml"
      - "docs/G2_S3_RESEARCH_MERMAID_EXPORT_ACCEPTANCE.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  s3:
    name: Research + Mermaid + DOCX/PDF
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium libreoffice-writer poppler-utils fonts-noto-cjk

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile and validate contracts
        run: |
          python -m compileall -q app scripts
          python scripts/validate_g0.py
          python prompt_pack/tools/validate_pack.py

      - name: Run C D and S3 regressions
        run: |
          python -m pytest -q \
            tests/test_research_skill_track_c.py \
            tests/test_d_track.py \
            tests/test_s3_research_mermaid_export.py

      - name: Run real rendering integration chain
        env:
          MERMAID_BROWSER_EXECUTABLE: /usr/bin/chromium
        run: |
          OUT="recovery_evidence/s3/${GITHUB_SHA}"
          mkdir -p "${OUT}"
          python scripts/run_s3_research_mermaid_export.py \
            --output-dir "${OUT}" \
            --fixture \
            --source-commit "${GITHUB_SHA}" \
            2>&1 | tee "${OUT}/acceptance.log"
          python scripts/verify_s3_evidence.py \
            "${OUT}/acceptance/S3_ACCEPTANCE.json" \
            --data-dir "${OUT}" \
            --json-out "${OUT}/acceptance/S3_REVERIFY.json"

      - name: Run full repository regression
        run: python -m pytest -q --tb=short

      - name: Upload S3 evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: g2-s3-research-mermaid-export-${{ github.sha }}
          path: recovery_evidence/s3/${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
