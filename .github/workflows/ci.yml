name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate G0 contracts
        run: python scripts/validate_g0.py

      - name: Compile application
        run: python -m compileall app

      - name: Validate Prompt Pack
        run: python prompt_pack/tools/validate_pack.py

      - name: Run test suite with evidence
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          python -m pytest -q --junitxml=test-results/ci-junit.xml \
            2>&1 | tee test-results/pytest.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "${status}" > test-results/pytest.status
          exit 0

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-evidence-${{ github.sha }}
          path: test-results
          if-no-files-found: error
          retention-days: 14

      - name: Enforce test decision
        run: test "$(cat test-results/pytest.status)" = "0"
