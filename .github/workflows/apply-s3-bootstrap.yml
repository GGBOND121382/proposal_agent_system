name: Apply S3 integration bootstrap

on:
  push:
    branches:
      - agent/integration-research-mermaid-export
    paths:
      - ".github/workflows/apply-s3-bootstrap.yml"
      - ".s3-bootstrap/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-s3-bootstrap.yml"
      - ".s3-bootstrap/**"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v7
        with:
          ref: agent/integration-research-mermaid-export
          fetch-depth: 0

      - name: Refresh accepted component branches
        run: |
          git fetch --force origin \
            +refs/heads/agent/research-skill:refs/remotes/origin/agent/research-skill \
            +refs/heads/agent/mermaid-export:refs/remotes/origin/agent/mermaid-export

      - name: Check out accepted Track C files
        run: |
          git checkout origin/agent/research-skill -- \
            app/research.py app/skill_setup.py \
            app/skills/research_audit.py app/skills/research_claims.py \
            app/skills/research_plan.py app/skills/verifiable_public_research.py \
            app/workflows.py docs/C_RESEARCH_SKILL_ACCEPTANCE.md \
            scripts/verify_research_archive.py tests/test_research_skill_track_c.py

      - name: Check out accepted Track D files
        run: |
          git checkout origin/agent/mermaid-export -- \
            app/delivery_validator.py app/delivery_validator_runtime.py \
            app/exporter_base.py app/exporter_manifest.py app/exporter_render.py \
            app/figure_protocol.py app/pdf_exporter.py app/skills/mermaid.py \
            docs/D_MERMAID_EXPORT_ACCEPTANCE.md scripts/run_d_track_acceptance.py \
            tests/test_d_track.py

      - name: Assemble readable S3 source parts
        run: |
          cat .s3-bootstrap/research_mermaid_export.py.part-* > app/research_mermaid_export.py
          cat .s3-bootstrap/run_s3.py.part-* > scripts/run_s3_research_mermaid_export.py
          cat .s3-bootstrap/test_s3.py.part-* > tests/test_s3_research_mermaid_export.py
          cp .s3-bootstrap/S3_ACCEPTANCE.md docs/S3_RESEARCH_MERMAID_EXPORT_ACCEPTANCE.md
          cp .s3-bootstrap/s3-workflow.yml .github/workflows/s3-research-mermaid-export.yml
          python -m py_compile \
            app/research_mermaid_export.py \
            scripts/run_s3_research_mermaid_export.py \
            tests/test_s3_research_mermaid_export.py

      - name: Update plan and ignore rules
        run: |
          python - <<'PY'
          from pathlib import Path
          ignore = Path('.gitignore')
          text = ignore.read_text(encoding='utf-8')
          for line in ('recovery_evidence/d/', 'recovery_evidence/s3/'):
              if line not in text.splitlines():
                  text += ('\n' if text and not text.endswith('\n') else '') + line + '\n'
          ignore.write_text(text, encoding='utf-8')
          plan = Path('docs/CONCURRENT_DEVELOPMENT_PLAN.md')
          text = plan.read_text(encoding='utf-8')
          needle = '3. Research + Mermaid + DOCX/PDF 链。\n\n**通过条件：** 不人工修改正文；发现的问题由责任 Agent 自主返修并复审。'
          replacement = '3. Research + Mermaid + DOCX/PDF 链。\n\n> 实现与验收入口：`app/research_mermaid_export.py`、`scripts/run_s3_research_mermaid_export.py`、`tests/test_s3_research_mermaid_export.py` 和 `docs/S3_RESEARCH_MERMAID_EXPORT_ACCEPTANCE.md`。工程集成验收使用 recorded connector fixture，不冒充 LIVE 检索或模型语义能力证明。\n\n**通过条件：** 不人工修改正文；发现的问题由责任 Agent 自主返修并复审。'
          if needle not in text:
              raise SystemExit('S3 plan insertion point not found')
          plan.write_text(text.replace(needle, replacement), encoding='utf-8')
          PY

      - name: Commit assembled integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .gitignore \
            .github/workflows/s3-research-mermaid-export.yml \
            app \
            docs \
            scripts \
            tests
          git status --short
          git commit -m "integrate research mermaid export chain"

      - name: Push assembled integration
        run: git push origin HEAD:agent/integration-research-mermaid-export
