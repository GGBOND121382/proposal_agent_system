name: Export Integration Sources

on:
  push:
    branches:
      - agent/integration-v06
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v7
        with:
          ref: agent/integration-v06
          path: integration
          fetch-depth: 0
      - name: Check out G1 base
        uses: actions/checkout@v7
        with:
          ref: 2a37a4359c8e833fb8b0107f8f67d88ff4c12c04
          path: base
          fetch-depth: 0
          persist-credentials: false
      - name: Check out Track E
        uses: actions/checkout@v7
        with:
          ref: ce7f7b59035af1faeb89be0b4a7b0288a71969be
          path: track-e
          fetch-depth: 0
          persist-credentials: false
      - name: Check out Track F
        uses: actions/checkout@v7
        with:
          ref: 217f69b272a1ad7aac506d40170798408200e6de
          path: track-f
          fetch-depth: 0
          persist-credentials: false
      - name: Remove Git metadata
        run: rm -rf integration/.git base/.git track-e/.git track-f/.git
      - name: Upload source trees
        uses: actions/upload-artifact@v7
        with:
          name: integration-source-trees-${{ github.sha }}
          path: |
            integration
            base
            track-e
            track-f
          if-no-files-found: error
          retention-days: 2
