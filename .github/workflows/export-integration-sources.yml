name: Apply G2 Integration Payload

on:
  push:
    branches:
      - agent/integration-v06
    paths:
      - ".integration/g2-payload.part*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v7
        with:
          ref: agent/integration-v06
          fetch-depth: 0
      - name: Apply complete payload once all chunks exist
        shell: bash
        run: |
          set -euo pipefail
          parts=(
            .integration/g2-payload.part01
            .integration/g2-payload.part02
            .integration/g2-payload.part03a
            .integration/g2-payload.part03b
            .integration/g2-payload.part03c
            .integration/g2-payload.part03d
            .integration/g2-payload.part04a
            .integration/g2-payload.part04b
            .integration/g2-payload.part04c
            .integration/g2-payload.part04d
          )
          for part in "${parts[@]}"; do
            if [ ! -f "${part}" ]; then
              echo "Payload incomplete; waiting for ${part}."
              exit 0
            fi
          done
          cat "${parts[@]}" | base64 --decode > /tmp/g2-payload.tar.xz
          echo "60a1ce2d2068ee1eba0c0016919a7280af37a0de441159ea9034ab7afbf8b1e0  /tmp/g2-payload.tar.xz" | sha256sum --check --strict
          tar -xJf /tmp/g2-payload.tar.xz -C .
          git rm -f "${parts[@]}"
          git config user.name "proposal-agent-integration-bot"
          git config user.email "proposal-agent-integration-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "implement G2 three-section cross-chapter chain"
          git push origin HEAD:agent/integration-v06
