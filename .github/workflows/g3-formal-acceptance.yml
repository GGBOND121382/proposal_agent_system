name: G3 Formal Capability Acceptance

on:
  push:
    branches:
      - agent/g3-formal-acceptance
    paths:
      - "app/config.py"
      - "app/llm.py"
      - "app/g3_*.py"
      - "app/runtime_bootstrap.py"
      - "app/full_proposal_concurrent.py"
      - "app/skill_setup.py"
      - "app/skills/crossref_public_research.py"
      - "scripts/build_g3_public_materials.py"
      - "scripts/run_g3_formal_acceptance.py"
      - "scripts/select_github_model.py"
      - "tests/test_g3_acceptance.py"
      - "tests/test_g3_cross_chapter.py"
      - ".github/workflows/g3-formal-acceptance.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/config.py"
      - "app/llm.py"
      - "app/g3_*.py"
      - "app/runtime_bootstrap.py"
      - "app/full_proposal_concurrent.py"
      - "app/skill_setup.py"
      - "app/skills/crossref_public_research.py"
      - "scripts/build_g3_public_materials.py"
      - "scripts/run_g3_formal_acceptance.py"
      - "scripts/select_github_model.py"
      - "tests/test_g3_acceptance.py"
      - "tests/test_g3_cross_chapter.py"
      - ".github/workflows/g3-formal-acceptance.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  models: read

jobs:
  regression:
    if: github.event_name != 'pull_request'
    name: Contracts and full regression
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install document dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium libreoffice-writer poppler-utils fonts-noto-cjk
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate contracts and run tests
        run: |
          python -m compileall -q app scripts tests
          python scripts/validate_g0.py
          python prompt_pack/tools/validate_pack.py
          python -m pytest -q --tb=short

  live-g3:
    if: github.event_name != 'pull_request'
    name: Real model, live research, full proposal and delivery
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      MODEL_RUNTIME_MODE: LIVE
      CAPABILITY_ACCEPTANCE_MODE: "true"
      OFFLINE_LLM_ENABLED: "true"
      ONLINE_LLM_ENABLED: "true"
      OFFLINE_LLM_BASE_URL: https://models.github.ai/inference
      ONLINE_LLM_BASE_URL: https://models.github.ai/inference
      PUBLIC_SEARCH_PROVIDER: crossref
      PUBLIC_SEARCH_MAX_RESULTS: "16"
      MODEL_RESPONSE_FORMAT: json_object
      MODEL_SCHEMA_PROMPT_MODE: compact
      MODEL_MAX_OUTPUT_TOKENS: "4000"
      MODEL_MAX_INPUT_CHARACTERS: "46000"
      MODEL_MIN_REQUEST_INTERVAL_SECONDS: "4.2"
      MODEL_REQUEST_TIMEOUT_SECONDS: "300"
      MERMAID_BROWSER_EXECUTABLE: /usr/bin/chromium
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install document dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium libreoffice-writer poppler-utils fonts-noto-cjk
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Select current text model
        id: model
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          OUT="recovery_evidence/g3/${GITHUB_SHA}"
          mkdir -p "${OUT}/test_logs"
          python scripts/select_github_model.py --json-out "${OUT}/model_selection.json"
      - name: Run formal G3 chain
        id: formal
        continue-on-error: true
        env:
          OFFLINE_LLM_API_KEY: ${{ github.token }}
          ONLINE_LLM_API_KEY: ${{ github.token }}
        run: |
          OUT="recovery_evidence/g3/${GITHUB_SHA}"
          export APP_DATA_DIR="${OUT}/runtime"
          export MODEL_CALL_EVIDENCE_DIR="${OUT}/model_calls"
          python scripts/run_g3_formal_acceptance.py --output-dir "${OUT}" \
            2>&1 | tee "${OUT}/test_logs/g3-formal.log"
      - name: Audit traces and build recovery bundle
        if: steps.formal.outcome == 'success'
        run: |
          OUT="recovery_evidence/g3/${GITHUB_SHA}"
          python scripts/audit_prompt_traces.py \
            --database "${OUT}/workflow_checkpoint.sqlite" \
            --output-dir "${OUT}/prompt_trace_audit" \
            2>&1 | tee "${OUT}/test_logs/trace-audit.log"
          python scripts/f_recovery_bundle.py build \
            --database "${OUT}/workflow_checkpoint.sqlite" \
            --test-log "${OUT}/test_logs/g3-formal.log" \
            --test-log "${OUT}/test_logs/trace-audit.log" \
            --output "${OUT}/recovery_bundle.zip" \
            | tee "${OUT}/test_logs/recovery-build.json"
          python scripts/f_recovery_bundle.py verify \
            "${OUT}/recovery_bundle.zip" \
            --extract-dir /tmp/g3-restored \
            --report "${OUT}/recovery-verify.json"
      - name: Enforce formal result
        if: always()
        env:
          FORMAL_OUTCOME: ${{ steps.formal.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path("recovery_evidence/g3") / os.environ["GITHUB_SHA"]
          if os.environ.get("FORMAL_OUTCOME") != "success":
              raise SystemExit("Formal G3 runner did not complete successfully")
          report = json.loads((root / "G3_FORMAL_CAPABILITY_ACCEPTANCE.json").read_text())
          recovery = json.loads((root / "recovery-verify.json").read_text())
          assert report.get("status") == "PASS", report
          assert all(report.get("checks", {}).values()), report.get("checks")
          assert recovery.get("status") == "PASS", recovery
          PY
      - name: Upload G3 evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: g3-formal-capability-${{ github.sha }}
          path: recovery_evidence/g3/${{ github.sha }}
          if-no-files-found: error
          retention-days: 30

  mirror-live-result:
    if: github.event_name == 'pull_request'
    name: Mirror same-head formal result
    runs-on: ubuntu-latest
    timeout-minutes: 190
    env:
      GH_TOKEN: ${{ github.token }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Locate and mirror branch run
        run: |
          mkdir -p g3-run-mirror
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          head_sha = os.environ["HEAD_SHA"]
          branch = os.environ["HEAD_BRANCH"]
          token = os.environ["GH_TOKEN"]
          workflow = "g3-formal-acceptance.yml"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "proposal-agent-g3-mirror",
          }
          output = Path("g3-run-mirror/result.json")
          for _ in range(380):
              query = urllib.parse.urlencode({"branch": branch, "event": "push", "per_page": 30})
              url = f"https://api.github.com/repos/{repository}/actions/workflows/{workflow}/runs?{query}"
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=45) as response:
                  payload = json.load(response)
              matches = [item for item in payload.get("workflow_runs", []) if item.get("head_sha") == head_sha]
              if matches:
                  run = matches[0]
                  record = {
                      "run_id": run.get("id"),
                      "head_sha": run.get("head_sha"),
                      "status": run.get("status"),
                      "conclusion": run.get("conclusion"),
                      "html_url": run.get("html_url"),
                  }
                  output.write_text(json.dumps(record, indent=2), encoding="utf-8")
                  if run.get("status") == "completed":
                      if run.get("conclusion") != "success":
                          raise SystemExit(f"Same-head formal run concluded {run.get('conclusion')}")
                      raise SystemExit(0)
              time.sleep(30)
          raise SystemExit("Timed out before the same-head formal run completed")
          PY
      - name: Upload mirrored run record
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: g3-formal-run-mirror-${{ github.event.pull_request.head.sha }}
          path: g3-run-mirror
          if-no-files-found: error
          retention-days: 30
