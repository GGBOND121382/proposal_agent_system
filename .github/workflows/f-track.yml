name: F Test Evidence Gate

on:
  push:
    branches:
      - agent/integration-v06
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: |
          python scripts/validate_g0.py
          python scripts/validate_f.py
          python prompt_pack/tools/validate_pack.py
          python -m compileall -q app scripts tests

  runtime-recovery-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_workflow_recovery.py::test_workflow_recovers_from_every_persisted_checkpoint

  agent-prompt-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_agent_matrix.py

  research-skill-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_components.py::test_skill_registry_contains_research_and_mermaid tests/test_f_components.py::test_recorded_research_archives_verifiable_hashes

  mermaid-export-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Install document rendering system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium libreoffice-writer poppler-utils fonts-noto-cjk
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_components.py::test_mermaid_source_contract_accepts_safe_and_blocks_active_content tests/test_runtime.py::test_all_workflows_and_docx_export

  quality-validation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_components.py::test_quality_guard_rejects_shallow_unsupported_project_graph tests/test_quality_track_e.py

  trace-and-recovery-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: |
          OUT="recovery_evidence/f/${GITHUB_SHA}"
          mkdir -p "${OUT}"
          python scripts/create_f_trace_smoke.py --database "${OUT}/runtime/proposal_agents.sqlite3"
          python scripts/audit_prompt_traces.py --database "${OUT}/runtime/proposal_agents.sqlite3" --output-dir "${OUT}/prompt_traces"
          python -m pytest -q tests/test_f_trace_recovery.py | tee "${OUT}/pytest.log"
          BUNDLE="${OUT}/f-recovery-${GITHUB_SHA::12}.zip"
          python scripts/f_recovery_bundle.py build --database "${OUT}/runtime/proposal_agents.sqlite3" --test-log "${OUT}/pytest.log" --output "${BUNDLE}"
          python scripts/f_recovery_bundle.py verify "${BUNDLE}" --extract-dir /tmp/f-restored --report "${OUT}/F_RECOVERY_VERIFY.json"
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: f-test-evidence-${{ github.sha }}
          path: recovery_evidence/f/${{ github.sha }}
          if-no-files-found: error
          retention-days: 14

  small-e2e-single-section:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_f_workflow_recovery.py::test_small_single_section_authoring_export_chain

  small-e2e-three-sections:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q tests/test_g2_three_section_chain.py tests/test_f_workflow_recovery.py::test_small_three_section_authoring_export_chain

  small-e2e-research-mermaid-export:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
      - name: Install document rendering system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium libreoffice-writer poppler-utils fonts-noto-cjk
      - uses: actions/setup-python@v6
        with: {python-version: "3.12", cache: pip, cache-dependency-path: requirements-dev.txt}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: |
          python -m pytest -q tests/test_runtime.py::test_all_workflows_and_docx_export
          python -m pytest -q tests/test_f_components.py
