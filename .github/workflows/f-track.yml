name: F Test Evidence Gate

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Validate G0, F, Prompt Pack and Python syntax
        run: |
          python scripts/validate_g0.py
          python scripts/validate_f.py
          python prompt_pack/tools/validate_pack.py
          python -m compileall app scripts tests

  runtime-recovery-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Restart from every persisted workflow checkpoint
        run: python -m pytest -q tests/test_f_workflow_recovery.py::test_workflow_recovers_from_every_persisted_checkpoint

  agent-prompt-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run 30-Agent positive negative edge restart matrix
        run: python -m pytest -q tests/test_f_agent_matrix.py

  research-skill-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run public research tests or static fallback
        shell: bash
        run: |
          if python -m pytest --collect-only -q | grep -Eiq 'research'; then
            python -m pytest -q -k 'research'
          else
            python -m compileall app/research.py app/skills/public_research.py
          fi

  mermaid-export-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run Mermaid and export tests or static fallback
        shell: bash
        run: |
          if python -m pytest --collect-only -q | grep -Eiq 'mermaid|diagram|export'; then
            python -m pytest -q -k 'mermaid or diagram or export'
          else
            python -m compileall app/diagram_enrichment.py app/exporter.py app/skills/mermaid.py
          fi

  quality-validation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run deterministic and integration quality checks
        shell: bash
        run: |
          if python -m pytest --collect-only -q | grep -Eiq 'quality|critic|repair'; then
            python -m pytest -q -k 'quality or critic or repair'
          else
            python -m compileall app/proposal_quality.py app/workflow_repair.py
          fi

  trace-and-recovery-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Build auditable prompt calls and recovery evidence
        shell: bash
        run: |
          OUT="recovery_evidence/f/${GITHUB_SHA}"
          mkdir -p "${OUT}"
          python scripts/create_f_trace_smoke.py --database "${OUT}/runtime/proposal_agents.sqlite3"
          python scripts/audit_prompt_traces.py \
            --database "${OUT}/runtime/proposal_agents.sqlite3" \
            --output-dir "${OUT}/prompt_traces"
          python -m pytest -q tests/test_f_trace_recovery.py | tee "${OUT}/pytest.log"
          BUNDLE="${OUT}/f-recovery-${GITHUB_SHA::12}.zip"
          python scripts/f_recovery_bundle.py build \
            --database "${OUT}/runtime/proposal_agents.sqlite3" \
            --test-log "${OUT}/pytest.log" \
            --output "${BUNDLE}"
          python scripts/f_recovery_bundle.py verify "${BUNDLE}" \
            --extract-dir /tmp/f-restored \
            --report "${OUT}/F_RECOVERY_VERIFY.json"
      - name: Upload F evidence
        uses: actions/upload-artifact@v4
        with:
          name: f-test-evidence-${{ github.sha }}
          path: recovery_evidence/f/${{ github.sha }}
          if-no-files-found: error
          retention-days: 14

  small-e2e-single-section:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q 'tests/test_f_workflow_recovery.py::test_small_authoring_export_chains[titles0]'

  small-e2e-three-sections:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q 'tests/test_f_workflow_recovery.py::test_small_authoring_export_chains[titles1]'

  small-e2e-research-mermaid-export:
    needs: [lint-and-schema, runtime-recovery-tests, agent-prompt-tests, research-skill-tests, mermaid-export-tests, quality-validation-tests, trace-and-recovery-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run workflow chain plus Research/Mermaid/Export component tests
        shell: bash
        run: |
          python -m pytest -q tests/test_runtime.py::test_all_workflows_and_docx_export
          if python -m pytest --collect-only -q | grep -Eiq 'research|mermaid|diagram'; then
            python -m pytest -q -k 'research or mermaid or diagram'
          else
            python -m compileall app/research.py app/diagram_enrichment.py app/skills/public_research.py app/skills/mermaid.py app/exporter.py
          fi
