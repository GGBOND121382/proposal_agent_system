name: Apply full-proposal concurrent authoring

on:
  push:
    branches:
      - agent/full-proposal-concurrent-authoring
    paths:
      - ".github/full-proposal/**"
      - ".github/workflows/apply-full-proposal.yml"

permissions:
  contents: write

concurrency:
  group: apply-full-proposal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out staged branch
        uses: actions/checkout@v7
        with:
          ref: agent/full-proposal-concurrent-authoring
          fetch-depth: 0

      - name: Verify frozen main baseline
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "799edd1db5074a5442acf8ada7348f432bd876a1"
          git merge-base --is-ancestor origin/main HEAD

      - name: Verify and apply transparent patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/full-proposal/patch.part-* > /tmp/full-proposal.patch
          echo "bb792c16b7626ca6d535df8f1f1669a8ac8a30a0905667a7aa05301e0dd000b7  /tmp/full-proposal.patch" | sha256sum --check --strict
          git apply --check /tmp/full-proposal.patch
          git apply --index /tmp/full-proposal.patch

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate production source before publication
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m compileall -q app scripts tests
          python scripts/validate_g0.py
          python prompt_pack/tools/validate_pack.py
          python -m pytest -q \
            tests/test_full_proposal_concurrent.py \
            tests/test_single_section_chain.py \
            tests/test_g2_three_section_chain.py

      - name: Commit and push production source
        shell: bash
        run: |
          set -euo pipefail
          git restore --staged .github/full-proposal .github/workflows/apply-full-proposal.yml
          git checkout HEAD -- .github/full-proposal .github/workflows/apply-full-proposal.yml
          git add -A
          git config user.name "proposal-agent-integration"
          git config user.email "proposal-agent-integration@users.noreply.github.com"
          git commit -m "complete full-proposal concurrent authoring"
          git push origin HEAD:agent/full-proposal-concurrent-authoring
