name: Clean full-proposal staging files

on:
  push:
    branches:
      - agent/full-proposal-concurrent-authoring
    paths:
      - ".github/workflows/apply-full-proposal.yml"

permissions:
  contents: write

concurrency:
  group: clean-full-proposal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/full-proposal-concurrent-authoring
          fetch-depth: 0

      - name: Remove transparent staging payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/full-proposal
          git add -A .github/full-proposal
          git config user.name "proposal-agent-integration"
          git config user.email "proposal-agent-integration@users.noreply.github.com"
          git commit -m "remove full-proposal staging payload"
          git push origin HEAD:agent/full-proposal-concurrent-authoring
