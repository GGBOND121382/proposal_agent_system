version: '3.0'
purpose: 将项目事实图与申请书论证图分离，保证申请书围绕一个中心命题、有限研究问题和可验证的方法链组织。
node_types:
  - DOCUMENT_CONTRACT
  - CENTRAL_PROPOSITION
  - RESEARCH_GAP
  - RESEARCH_QUESTION
  - CLOSEST_PRIOR_WORK
  - LIMITATION_MECHANISM
  - ASSUMPTION
  - OBJECTIVE
  - WORK_PACKAGE
  - FORMAL_MODEL
  - DECISION_VARIABLE
  - OBJECTIVE_FUNCTION
  - CONSTRAINT
  - ALGORITHM_COMPONENT
  - THEORETICAL_PROPERTY
  - NOVEL_MECHANISM
  - EXPECTED_CONTRIBUTION
  - EVIDENCE_CLAIM
  - PUBLIC_SOURCE
  - DATASET
  - BASELINE
  - EVALUATION_QUESTION
  - EXPERIMENT_DESIGN
  - ABLATION
  - SUCCESS_CRITERION
  - PRELIMINARY_RESULT
  - TEAM_EVIDENCE
  - SYSTEM_REQUIREMENT
  - SCOPE_BOUNDARY
  - SECTION_CONTRACT
  - ARGUMENT_CLAIM
  - ARGUMENT_EVIDENCE
  - ARGUMENT_WARRANT
  - COUNTERARGUMENT
allowed_edges:
  - [DOCUMENT_CONTRACT, CONSTRAINS, SECTION_CONTRACT]
  - [RESEARCH_GAP, MOTIVATES, RESEARCH_QUESTION]
  - [CLOSEST_PRIOR_WORK, EXHIBITS, LIMITATION_MECHANISM]
  - [LIMITATION_MECHANISM, EXPLAINS, RESEARCH_GAP]
  - [RESEARCH_QUESTION, ANSWERED_BY, CENTRAL_PROPOSITION]
  - [CENTRAL_PROPOSITION, DECOMPOSES_TO, OBJECTIVE]
  - [OBJECTIVE, DECOMPOSES_TO, WORK_PACKAGE]
  - [WORK_PACKAGE, FORMALIZED_AS, FORMAL_MODEL]
  - [FORMAL_MODEL, HAS_VARIABLE, DECISION_VARIABLE]
  - [FORMAL_MODEL, HAS_OBJECTIVE, OBJECTIVE_FUNCTION]
  - [FORMAL_MODEL, HAS_CONSTRAINT, CONSTRAINT]
  - [FORMAL_MODEL, SOLVED_BY, ALGORITHM_COMPONENT]
  - [ALGORITHM_COMPONENT, ESTABLISHES, THEORETICAL_PROPERTY]
  - [LIMITATION_MECHANISM, OVERCOME_BY, NOVEL_MECHANISM]
  - [NOVEL_MECHANISM, REALIZED_BY, ALGORITHM_COMPONENT]
  - [NOVEL_MECHANISM, PRODUCES, EXPECTED_CONTRIBUTION]
  - [WORK_PACKAGE, VALIDATED_BY, EXPERIMENT_DESIGN]
  - [EXPERIMENT_DESIGN, COMPARES_WITH, BASELINE]
  - [EXPERIMENT_DESIGN, USES, DATASET]
  - [EXPERIMENT_DESIGN, ANSWERS, EVALUATION_QUESTION]
  - [EXPERIMENT_DESIGN, CONTAINS, ABLATION]
  - [EVALUATION_QUESTION, MEASURED_BY, SUCCESS_CRITERION]
  - [PRELIMINARY_RESULT, SUPPORTS, CENTRAL_PROPOSITION]
  - [PRELIMINARY_RESULT, SUPPORTS, ALGORITHM_COMPONENT]
  - [TEAM_EVIDENCE, SUPPORTS, WORK_PACKAGE]
  - [PUBLIC_SOURCE, SUPPORTS, EVIDENCE_CLAIM]
  - [EVIDENCE_CLAIM, SUPPORTS, RESEARCH_GAP]
  - [SECTION_CONTRACT, PRESENTS, ARGUMENT_CLAIM]
  - [ARGUMENT_EVIDENCE, SUPPORTS, ARGUMENT_CLAIM]
  - [ARGUMENT_WARRANT, CONNECTS, ARGUMENT_EVIDENCE]
  - [ARGUMENT_WARRANT, CONNECTS, ARGUMENT_CLAIM]
  - [COUNTERARGUMENT, LIMITS, ARGUMENT_CLAIM]
constraints:
  central_proposition:
    minimum: 1
    maximum: 1
  research_questions:
    minimum: 1
    maximum: 4
  core_work_packages:
    minimum: 2
    maximum: 5
  closest_prior_work_per_innovation:
    minimum: 1
  evidence_per_major_claim:
    minimum: 1
  preliminary_evidence_for_foundation:
    minimum: 1
forbidden_substitutions:
  - SYSTEM_REQUIREMENT不得替代RESEARCH_QUESTION
  - DELIVERABLE不得替代EXPECTED_CONTRIBUTION
  - Trace存在不得替代ARGUMENT_EVIDENCE有效
  - 图表数量不得替代论证质量
  - 原型系统不得自动视为研究创新
