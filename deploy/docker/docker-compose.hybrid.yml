services:
  proposal-agent:
    image: proposal-agent:0.5.0-offline
    container_name: proposal-agent
    ports:
      - "8080:8080"
    env_file:
      - proposal-agent.env
    environment:
      PUBLIC_SEARCH_PROVIDER: searxng
      PUBLIC_SEARCH_BASE_URL: http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/var/lib/proposal-agent
      - ./prompt_pack:/app/prompt_pack:ro
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: proposal-agent-searxng
    volumes:
      - ./searxng:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped
